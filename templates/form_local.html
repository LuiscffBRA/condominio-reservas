{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{ titulo }}</title>
</head>
<body style="background-color: #f4f6f9;">
    <nav class="navbar navbar-expand-lg mb-5 shadow-sm" style="background-color: #1a2a3a; padding: 15px 0;">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="#">Condomínio Estrela</a>
            <a href="{% url 'listar_locais' %}" class="btn btn-outline-light btn-sm ms-auto">Voltar à Lista</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card p-4 border-0 shadow-sm" style="border-radius: 12px;">
            <h3 class="fw-bold mb-4 text-center text-dark">{{ titulo }}</h3>
            
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 mt-3 rounded-pill fw-bold" style="background-color: #066E8B; border: none;">Salvar Área Comum</button>
            </form>
        </div>
    </div>
</body>
</html>
